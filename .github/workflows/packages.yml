name: Build Debian packages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tip-packages
  cancel-in-progress: true

jobs:
  deb:
    name: Build ${{ matrix.architecture }} package
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            architecture: amd64
          - runner: ubuntu-22.04-arm
            architecture: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build Debian packages
        env:
          DEB_ARCHITECTURE: ${{ matrix.architecture }}
        shell: bash
        run: |
          base_version="$(awk -F '"' '$1 ~ /^version = / { print $2; exit }' Cargo.toml)"
          if [[ -z "$base_version" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi

          commit_epoch="$(git show -s --format=%ct HEAD)"
          commit_date="$(date -u -d "@${commit_epoch}" +%Y%m%d%H%M%S)"
          commit_short="$(git rev-parse --short=8 HEAD)"
          package_version="${base_version}+git${commit_date}.${commit_short}"
          mkdir dist

          cargo build --release --locked

          package_deb() {
            local architecture="$1"
            local output="$2"
            local package_root="dist/root-${architecture}"
            local installed_size

            install -Dm755 target/release/bbcat \
              "${package_root}/usr/bin/bbcat"
            install -Dm644 README.md \
              "${package_root}/usr/share/doc/bbcat/README.md"
            install -Dm644 LICENSE \
              "${package_root}/usr/share/doc/bbcat/copyright"
            install -Dm644 THIRD_PARTY_LICENSES \
              "${package_root}/usr/share/doc/bbcat/THIRD_PARTY_LICENSES"

            {
              echo "bbcat (${package_version}) unstable; urgency=medium"
              echo
              echo "  * Development snapshot of commit ${GITHUB_SHA}."
              echo
              echo " -- Ēriks Remess <eriks@remess.lv>  $(date --rfc-email)"
            } > "${package_root}/usr/share/doc/bbcat/changelog"
            gzip -9n "${package_root}/usr/share/doc/bbcat/changelog"
            chmod 644 "${package_root}/usr/share/doc/bbcat/changelog.gz"

            strip "${package_root}/usr/bin/bbcat"

            installed_size="$(du -sk "${package_root}/usr" | cut -f1)"
            mkdir -p "${package_root}/DEBIAN"
            {
              echo "Package: bbcat"
              echo "Version: ${package_version}"
              echo "Architecture: ${architecture}"
              echo "Maintainer: Ēriks Remess <eriks@remess.lv>"
              echo "Installed-Size: ${installed_size}"
              echo "Depends: libc6 (>= 2.35), libgcc-s1"
              echo "Section: utils"
              echo "Priority: optional"
              echo "Homepage: https://github.com/EriksRemess/bbcat"
              echo "Description: Decode ANSI and BBS art"
              echo " Decode ANSI and BBS art, view it in terminals, or export PNG,"
              echo " APNG, and GIF images. Supports ANSI and CP437 text, ASCIImation,"
              echo " DarkDraw DDW, ArtWorx ADF, RIPscrip, XBin, SAUCE metadata, and"
              echo " ZIP art packs."
            } > "${package_root}/DEBIAN/control"

            dpkg-deb --root-owner-group --build "$package_root" "$output"
          }

          package_deb \
            "$DEB_ARCHITECTURE" \
            "dist/bbcat_${package_version}_${DEB_ARCHITECTURE}.deb"

          dpkg-deb --info dist/*.deb

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: bbcat-tip-${{ matrix.architecture }}
          path: dist/*.deb
          if-no-files-found: error

  release:
    name: Update tip release
    needs: deb
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download Debian packages
        uses: actions/download-artifact@v8
        with:
          pattern: bbcat-tip-*
          path: dist
          merge-multiple: true

      - name: Update tip prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::8}"
          notes="Development snapshot built from [\`${short_sha}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}).

          - \`amd64\`: x86-64 PCs
          - \`arm64\`: Raspberry Pi 4/5 and other 64-bit ARM systems

          These packages track \`main\` and may be unstable."

          if gh release view tip --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/tip" \
              -f sha="$GITHUB_SHA" \
              -F force=true
            gh release edit tip --repo "$GITHUB_REPOSITORY" \
              --title "tip" \
              --notes "$notes" \
              --prerelease \
              --latest
          else
            gh release create tip --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "tip" \
              --notes "$notes" \
              --prerelease \
              --latest
          fi

          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/tip" --jq .id)"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" \
            --jq '.[] | select(.name | endswith(".deb")) | .id' |
            while read -r asset_id; do
              gh api --method DELETE \
                "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
            done

          gh release upload tip dist/*.deb \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
