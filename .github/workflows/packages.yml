name: Build Debian packages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tip-packages
  cancel-in-progress: true

jobs:
  deb:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build Debian packages
        shell: bash
        run: |
          package_version="$(awk -F '"' '$1 ~ /^version = / { print $2; exit }' Cargo.toml)"
          if [[ -z "$package_version" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi

          tip_version="${package_version}+tip.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}-1"
          mkdir dist

          cargo build --release --locked --target x86_64-unknown-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build --release --locked --target aarch64-unknown-linux-gnu

          package_deb() {
            local target="$1"
            local architecture="$2"
            local output="$3"
            local package_root="dist/root-${architecture}"
            local installed_size

            install -Dm755 "target/${target}/release/bbcat" \
              "${package_root}/usr/bin/bbcat"
            install -Dm644 README.md \
              "${package_root}/usr/share/doc/bbcat/README.md"
            install -Dm644 LICENSE \
              "${package_root}/usr/share/doc/bbcat/copyright"
            install -Dm644 THIRD_PARTY_LICENSES \
              "${package_root}/usr/share/doc/bbcat/THIRD_PARTY_LICENSES"

            {
              echo "bbcat (${tip_version}) unstable; urgency=medium"
              echo
              echo "  * Development snapshot of commit ${GITHUB_SHA}."
              echo
              echo " -- Ēriks Remess <eriks@remess.lv>  $(date --rfc-email)"
            } > "${package_root}/usr/share/doc/bbcat/changelog.Debian"
            gzip -9n "${package_root}/usr/share/doc/bbcat/changelog.Debian"
            chmod 644 "${package_root}/usr/share/doc/bbcat/changelog.Debian.gz"

            if [[ "$architecture" == amd64 ]]; then
              x86_64-linux-gnu-strip "${package_root}/usr/bin/bbcat"
            else
              aarch64-linux-gnu-strip "${package_root}/usr/bin/bbcat"
            fi

            installed_size="$(du -sk "${package_root}/usr" | cut -f1)"
            mkdir -p "${package_root}/DEBIAN"
            {
              echo "Package: bbcat"
              echo "Version: ${tip_version}"
              echo "Architecture: ${architecture}"
              echo "Maintainer: Ēriks Remess <eriks@remess.lv>"
              echo "Installed-Size: ${installed_size}"
              echo "Depends: libc6 (>= 2.35), libgcc-s1"
              echo "Section: utils"
              echo "Priority: optional"
              echo "Homepage: https://github.com/EriksRemess/bbcat"
              echo "Description: Decode ANSI and BBS art"
              echo " Decode ANSI and BBS art, view it in terminals, or export PNG,"
              echo " APNG, and GIF images. Supports ANSI and CP437 text, ASCIImation,"
              echo " DarkDraw DDW, ArtWorx ADF, RIPscrip, XBin, SAUCE metadata, and"
              echo " ZIP art packs."
            } > "${package_root}/DEBIAN/control"

            dpkg-deb --root-owner-group --build "$package_root" "$output"
          }

          package_deb \
            x86_64-unknown-linux-gnu \
            amd64 \
            dist/bbcat-tip-amd64.deb
          package_deb \
            aarch64-unknown-linux-gnu \
            arm64 \
            dist/bbcat-tip-arm64.deb

          dpkg-deb --info dist/bbcat-tip-amd64.deb
          dpkg-deb --info dist/bbcat-tip-arm64.deb

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: bbcat-tip-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Update tip prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          notes="Development snapshot built from [\`${short_sha}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}).

          - \`amd64\`: x86-64 PCs
          - \`arm64\`: Raspberry Pi 4/5 and other 64-bit ARM systems

          These packages track \`main\` and may be unstable."

          if gh release view tip >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/tip" \
              -f sha="$GITHUB_SHA" \
              -F force=true
            gh release edit tip \
              --title "tip" \
              --notes "$notes" \
              --prerelease \
              --latest=false
            gh release upload tip dist/*.deb --clobber
          else
            gh release create tip dist/*.deb \
              --target "$GITHUB_SHA" \
              --title "tip" \
              --notes "$notes" \
              --prerelease \
              --latest=false
          fi
