[package]
name = "bbcat"
version = "0.1.4"
edition = "2024"
description = "Render ANSI, DIZ, ADF, and XBin art as UTF-8 text, Kitty graphics, or PNG images"
license = "MIT AND BSD-2-Clause"
readme = "README.md"
documentation = "https://docs.rs/bbcat"
repository = "https://github.com/EriksRemess/bbcat"
keywords = ["ansi-art", "bbs", "kitty", "terminal", "xbin"]
categories = ["command-line-utilities", "multimedia::images"]
include = [
    "/src/**",
    "/Cargo.toml",
    "/README.md",
    "/LICENSE",
    "/THIRD_PARTY_LICENSES",
]

[dependencies]
